name: SuperCloudys
options:
  bundleIdPrefix: com.yeshan333
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "2.0.2"
    CURRENT_PROJECT_VERSION: "1"
    VERSIONING_SYSTEM: apple-generic
    ENABLE_HARDENED_RUNTIME: YES
  configs:
    Release:
      CLANG_ENABLE_CODE_COVERAGE: NO
      CLANG_COVERAGE_MAPPING: NO
      GCC_GENERATE_TEST_COVERAGE_FILES: NO
      GCC_INSTRUMENT_PROGRAM_FLOW_ARCS: NO

targets:
  SuperCloudys:
    type: application
    platform: macOS
    sources:
      - path: SuperCloudys
        excludes:
          - "**/*.entitlements"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yeshan333.SuperCloudys
        INFOPLIST_FILE: SuperCloudys/Info.plist
        CODE_SIGN_ENTITLEMENTS: SuperCloudys/SuperCloudys.entitlements
    dependencies:
      - target: SuperCloudysExtension
        embed: true
        codeSign: true
        buildPhase:
          copyFiles:
            destination: plugins

  SuperCloudysExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: SuperCloudysExtension
        excludes:
          - "**/*.entitlements"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yeshan333.SuperCloudys.FinderSyncExtension
        INFOPLIST_FILE: SuperCloudysExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: SuperCloudysExtension/SuperCloudysExtension.entitlements
    frameworks:
      - sdk: FinderSync.framework

  SuperCloudysTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SuperCloudysTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yeshan333.SuperCloudysTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SuperCloudys.app/Contents/MacOS/SuperCloudys"
    dependencies:
      - target: SuperCloudys
