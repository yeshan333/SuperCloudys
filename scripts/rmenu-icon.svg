<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F7DA"/>
      <stop offset="55%" stop-color="#A6DE9C"/>
      <stop offset="100%" stop-color="#6BC079"/>
    </linearGradient>
    <linearGradient id="hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Squircle-ish background -->
  <rect x="80" y="80" width="864" height="864" rx="200" ry="200" fill="url(#bg)"/>
  <!-- Top sheen -->
  <rect x="80" y="80" width="864" height="432" rx="200" ry="200" fill="url(#hi)"/>

  <!-- Menu glyph: rounded white bars with subtle drop shadow -->
  <g filter="url(#shadow)">
    <!-- Bar 1 -->
    <rect x="270" y="340" width="484" height="64" rx="32" ry="32" fill="#FFFFFF"/>
    <!-- Dot 1 -->
    <circle cx="220" cy="372" r="32" fill="#FFFFFF"/>

    <!-- Bar 2 -->
    <rect x="270" y="480" width="380" height="64" rx="32" ry="32" fill="#FFFFFF"/>
    <!-- Dot 2 -->
    <circle cx="220" cy="512" r="32" fill="#FFFFFF"/>

    <!-- Bar 3 (highlighted - selected item) -->
    <rect x="200" y="600" width="624" height="84" rx="42" ry="42" fill="#FFFFFF" opacity="0.95"/>
    <text x="248" y="662" font-family="-apple-system, SF Pro Display, Helvetica" font-size="56" font-weight="700" fill="#3FA060">R-Menu</text>
  </g>
</svg>
